<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dum-Sampler v0.12.4</title>
    <style>
        :root {
            --bg-color: #001a35;
            --panel-color: #002d5c;
            --accent-color: #cccccc;
            --text-color: #ffffff;
            --node-off: #004080;
            --node-on: #cccccc;
            --rec-red: #ff0000;
            --the-one: #ff3333;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, sans-serif; margin: 0; padding: 10px;
            user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; 
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0 10px 0; }
        .version-info { font-size: 10px; text-align: right; opacity: 0.8; }

        .transport {
            background: var(--panel-color); padding: 10px; border-radius: 10px;
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;
        }

        .transport-top { display: flex; align-items: center; gap: 15px; width: 100%; }
        #play-btn {
            background: var(--accent-color); border: none; padding: 15px 25px;
            font-weight: 600; border-radius: 5px; font-size: 14px; color: #001a35; cursor: pointer;
        }

        .sliders-group { flex-grow: 1; display: flex; flex-direction: column; gap: 6px;}
        .slider-label { font-size: 9px; text-transform: uppercase; color: var(--accent-color); display: block; margin-bottom: 2px;}
        input[type=range] { width: 100%; accent-color: var(--accent-color); height: 20px; margin:0; }

        .track-lane { background: rgba(0,0,0,0.2); margin-bottom: 8px; border-radius: 8px; padding: 6px; }
        .track-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }

        .sample-name {
            background: var(--node-off); padding: 4px 8px; border-radius: 4px;
            font-size: 10px; min-width: 85px; color: #add8e6; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85px;
        }

        .controls-right { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
        .action-sm-btn { background: #2a2a2a; border: 1px solid #444; color: #ccc; font-size: 9px; padding: 4px 6px; border-radius: 4px; cursor: pointer; }
        .action-sm-btn.active-choke { color: #ffffff; border-color: #ffffff; }
        
        .nudge-panel { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; margin-bottom: 6px; display: none; }
        
        .bar-row { display: flex; width: 100%; justify-content: space-between; position: relative; margin-bottom: 3px; height: 20px; }
        .node-wrapper { position: relative; width: 100%; display: flex; justify-content: space-between; }
        .node { width: 6%; height: 20px; background: var(--node-off); border-radius: 2px; cursor: pointer; }
        .node.active { background: var(--node-on); box-shadow: 0 0 8px var(--node-on); }
        
        .playhead { position: absolute; top: 0; bottom: 0; left: 0; width: 3px; background: #fff; box-shadow: 0 0 6px #fff; pointer-events: none; z-index: 10; display: none; height: 100%; margin-left: 1px;}

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel-color); width: 90%; max-height: 92%; padding: 15px; border-radius: 12px; border: 2px solid var(--accent-color); display: flex; flex-direction: column; }

        .rec-visualizer-zone { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #1a4a7a; position: relative; }
        .modal-header-btns { display: flex; justify-content: space-around; align-items: center; margin-bottom: 12px; }

        .rec-btn { background: var(--rec-red); color: white; border: none; padding: 15px 25px; border-radius: 40px; font-weight: 600; font-size: 13px; min-width: 120px; cursor: pointer; }
        .rec-btn.waiting { background: #aaaaaa; color: #000; }
        .rec-btn.recording { background: #fff; color: #ff0000; animation: pulse 1s infinite; }
        
        .action-btn { background: #444; color: white; border: none; padding: 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .commit-btn { background: #28a745; color: white; font-weight: 600; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .sample-list { overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 5px; flex-grow: 1; }
        .sample-item { padding: 12px; border-bottom: 1px solid #1a4a7a; font-size: 14px; color: #add8e6; cursor: pointer; }
        
        .modal-node { width: 6%; height: 20px; background: #003366; border-radius: 1px; }
        .modal-node.the-only-one { background: var(--the-one) !important; box-shadow: 0 0 10px var(--the-one); }
    </style>
</head>
<body>

<header>
    <div style="color: var(--accent-color); font-size: 18px; font-weight:bold;">dum-Sampler <span style="color:white; font-size: 12px; opacity:0.6;">v0.12.4</span></div>
    <div class="version-info">Created by Jeremiah Keller<br>Sacramento 2026</div>
</header>

<div class="transport">
    <div class="transport-top">
        <button id="play-btn">PLAY</button>
        <div class="sliders-group">
            <div style="display: flex; justify-content: space-between;">
                <span class="slider-label">Master Vol</span>
                <span class="slider-label">Tempo: <span id="bpm-text">150 BPM</span></span>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="range" id="master-vol" min="0" max="1" step="0.05" value="0.8" style="width:40%;">
                <input type="range" id="tempo" min="40" max="220" value="150" oninput="document.getElementById('bpm-text').innerText = this.value + ' BPM'" style="width:60%;">
            </div>
        </div>
    </div>
</div>

<div id="main-grid"></div>

<div id="sample-modal" class="modal">
    <div class="modal-content">
        <div class="rec-visualizer-zone">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span id="modal-track-name" style="font-size:11px; color:var(--accent-color); font-weight:bold;">READY</span>
                <button class="action-sm-btn" id="modal-bar-cycle" style="min-width: 60px; padding:6px;">1 BAR</button>
            </div>
            <div id="modal-bars-container"></div>
        </div>
        
        <div style="margin-bottom: 15px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;">
            <span class="slider-label" style="display:flex; justify-content:space-between;">
                <span>Start Point Nudge (Latency)</span>
                <span id="modal-nudge-val" style="color:#fff;">0ms</span>
            </span>
            <input type="range" id="modal-nudge" min="-300" max="300" value="0" step="5">
        </div>

        <div class="modal-header-btns">
            <button class="action-btn" id="modal-clear-btn">DELETE</button>
            <button class="rec-btn" id="rec-action-btn">● RECORD</button>
            <button class="action-btn commit-btn" id="modal-commit-btn">COMMIT</button>
        </div>

        <div class="sample-list" id="modal-sample-list"></div>
        <button onclick="closeModal()" style="margin-top:10px; padding:15px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">BACK TO GRID</button>
    </div>
</div>

<script>
    const tracks = [
        { name: 'ds_kick1.wav', steps: [0, 4], volume: 80, bars: 1, nudge: 0, choke: true, buffer: null, lastSource: null },
        { name: 'ds_snare1.wav', steps: [8], volume: 80, bars: 1, nudge: 0, choke: true, buffer: null, lastSource: null },
        { name: 'ds_hihat1.wav', steps: [0, 2, 4, 6, 8, 10, 12, 14], volume: 80, bars: 1, nudge: 0, choke: true, buffer: null, lastSource: null },
        { name: 'EMPTY', steps: [], volume: 80, bars: 1, nudge: -200, choke: true, buffer: null, lastSource: null },
        { name: 'EMPTY', steps: [], volume: 80, bars: 1, nudge: -200, choke: true, buffer: null, lastSource: null },
        { name: 'EMPTY', steps: [], volume: 80, bars: 1, nudge: -200, choke: true, buffer: null, lastSource: null },
        { name: 'EMPTY', steps: [], volume: 80, bars: 1, nudge: -200, choke: true, buffer: null, lastSource: null },
        { name: 'EMPTY', steps: [], volume: 80, bars: 1, nudge: -200, choke: true, buffer: null, lastSource: null }
    ];

    const sampleFiles = ['ds_kick1.wav', 'ds_snare1.wav', 'ds_hihat1.wav', 'ds_hihat2.wav', 'ds_clapsn1.wav', 'ds_kick2.wav'];
    const preFetchedBuffers = {};

    let audioCtx = null;
    let masterGain = null;
    let isPlaying = false, currentStep = 0, nextStepTime = 0, masterMuted = false, activeTrackIdx = null;
    let isWaitingForFirstOne = false, isWaitingFullCycle = false, isRecordingNow = false;
    let cycleCounter = 0, recordCounter = 0, userSampleCount = 0;
    let mediaRecorder = null, audioChunks = [], tempBuffer = null;
    let targetBarLength = 16;

    tracks.forEach(t => { 
        let s = new Array(64).fill(false);
        if(t.steps) t.steps.forEach(idx => s[idx] = true);
        t.steps = s;
    });

    function renderSequencer() {
        const mainGrid = document.getElementById('main-grid');
        if (!mainGrid) return;
        mainGrid.innerHTML = '';
        tracks.forEach((track, tIdx) => {
            const lane = document.createElement('div');
            lane.className = 'track-lane';
            
            let barHtml = '';
            for(let b=0; b < track.bars; b++) {
                barHtml += `<div class="bar-row">
                    <div class="playhead" id="ph-${tIdx}-bar-${b}"></div>
                    <div class="node-wrapper">
                    ${Array.from({length: 16}).map((_, s) => `<div class="node ${track.steps[(b*16)+s]?'active':''}" onclick="tglNode(${tIdx},${(b*16)+s},this)"></div>`).join('')}
                    </div>
                </div>`;
            }
            
            lane.innerHTML = `
            <div class="track-controls">
                <div class="sample-name" onclick="openModal(${tIdx})">${track.name}</div>
                <input type="range" min="0" max="100" step="1" value="${track.volume}" oninput="tracks[${tIdx}].volume=this.value" style="width:25%;">
                <div class="controls-right">
                    <button class="action-sm-btn" onclick="toggleNudgePanel(${tIdx})">SYNC</button>
                    <button class="action-sm-btn ${track.choke ? 'active-choke' : ''}" onclick="toggleChoke(${tIdx})">CHOKE:${track.choke ? 'ON' : 'OFF'}</button>
                    <button class="action-sm-btn" onclick="cycleBars(${tIdx})">${track.bars} BAR</button>
                </div>
            </div>
            <div class="nudge-panel" id="nudge-panel-${tIdx}">
                <span class="slider-label" style="display:flex; justify-content:space-between;">
                    <span>Track Nudge</span>
                    <span id="lane-nudge-val-${tIdx}" style="color:#fff;">${track.nudge}ms</span>
                </span>
                <input type="range" min="-300" max="300" value="${track.nudge}" step="5" oninput="updateLaneNudge(${tIdx}, this.value)">
            </div>
            <div class="bars-container">${barHtml}</div>`;
            
            mainGrid.appendChild(lane);
        });
    }

    function toggleNudgePanel(tIdx) {
        const panel = document.getElementById(`nudge-panel-${tIdx}`);
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function toggleChoke(tIdx) {
        tracks[tIdx].choke = !tracks[tIdx].choke;
        renderSequencer();
    }

    function updateLaneNudge(tIdx, val) {
        tracks[tIdx].nudge = parseInt(val);
        document.getElementById(`lane-nudge-val-${tIdx}`).innerText = val + 'ms';
    }

    async function preFetchAll() {
        for (let t of tracks) {
            if (t.name !== 'EMPTY' && !preFetchedBuffers[t.name]) {
                try {
                    const res = await fetch(`samples/${t.name}`);
                    if(res.ok) preFetchedBuffers[t.name] = await res.arrayBuffer();
                } catch (e) { console.warn("Missing file or offline:", t.name); }
            }
        }
    }

    async function initAudioContextAndDecode() {
        if (!audioCtx) { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        for (let i = 0; i < tracks.length; i++) {
            if (tracks[i].name !== 'EMPTY' && preFetchedBuffers[tracks[i].name] && !tracks[i].buffer) {
                const bufferCopy = preFetchedBuffers[tracks[i].name].slice(0);
                audioCtx.decodeAudioData(bufferCopy, (decoded) => { tracks[i].buffer = decoded; });
            }
        }
    }

    function normalizeBuffer(buffer) {
        let maxPeak = 0;
        for (let c = 0; c < buffer.numberOfChannels; c++) {
            const data = buffer.getChannelData(c);
            for (let i = 0; i < data.length; i++) {
                if (Math.abs(data[i]) > maxPeak) maxPeak = Math.abs(data[i]);
            }
        }
        if (maxPeak > 0 && maxPeak < 1.0) {
            const multiplier = 1.0 / maxPeak; 
            for (let c = 0; c < buffer.numberOfChannels; c++) {
                const data = buffer.getChannelData(c);
                for (let i = 0; i < data.length; i++) {
                    data[i] *= multiplier;
                }
            }
        }
        return buffer;
    }

    async function initMic() {
        if (mediaRecorder) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false } 
            });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const arrayBuffer = await audioBlob.arrayBuffer();
                audioCtx.decodeAudioData(arrayBuffer, (decoded) => {
                    tempBuffer = normalizeBuffer(decoded);
                    document.getElementById('modal-track-name').innerText = "PREVIEW READY";
                });
            };
        } catch (err) { console.error("Mic error: " + err); }
    }

    function scheduler() {
        while (nextStepTime < audioCtx.currentTime + 0.1) {
            if (activeTrackIdx !== null) {
                targetBarLength = tracks[activeTrackIdx].bars * 16;
                const laneRelative = currentStep % targetBarLength;
                
                if (isWaitingForFirstOne && laneRelative === 0) {
                    isWaitingForFirstOne = false; isWaitingFullCycle = true; cycleCounter = 0; updateRecBtnUI();
                }
                if (isWaitingFullCycle) {
                    cycleCounter++;
                    if (cycleCounter >= targetBarLength && laneRelative === targetBarLength - 1) {
                        isWaitingFullCycle = false; isRecordingNow = true; masterMuted = true;
                        
                        masterGain.gain.setValueAtTime(0, nextStepTime);
                        
                        recordCounter = 0; audioChunks = []; 
                        setTimeout(() => mediaRecorder.start(), 0); updateRecBtnUI();
                    }
                }
                if (isRecordingNow) {
                    recordCounter++;
                    if (recordCounter >= targetBarLength && laneRelative === targetBarLength - 1) {
                        isRecordingNow = false; masterMuted = false; 
                        
                        masterGain.gain.setValueAtTime(1, nextStepTime);
                        
                        setTimeout(() => mediaRecorder.stop(), 0); updateRecBtnUI();
                    }
                }
                
                if (!isRecordingNow && tempBuffer && laneRelative === 0) { 
                    playSample(tempBuffer, nextStepTime, 1.0, tracks[activeTrackIdx].nudge, tracks[activeTrackIdx]); 
                }
            }

            if (!masterMuted) {
                tracks.forEach((track) => {
                    if (track.steps[currentStep % (track.bars * 16)]) { 
                        playSample(track.buffer, nextStepTime, track.volume, track.nudge, track); 
                    }
                });
            }
            nextStepTime += (60 / document.getElementById('tempo').value) / 4;
            currentStep++; 
        }
        if (isPlaying) { setTimeout(scheduler, 25); requestAnimationFrame(updateUI); }
    }

    function playSample(buffer, time, vol, nudgeMs = 0, trackObj = null) {
        if (!buffer || !audioCtx) return;
        const source = audioCtx.createBufferSource();
        const gain = audioCtx.createGain();
        source.buffer = buffer; 
        
        gain.gain.value = (vol / 100) * document.getElementById('master-vol').value; 
        source.connect(gain); gain.connect(masterGain);
        
        // Reverted to exactly how it worked in v0.12.2
        let startTime = time;
        let offsetInFile = 0;
        
        if (nudgeMs < 0) {
            offsetInFile = Math.abs(nudgeMs) / 1000;
        } else if (nudgeMs > 0) {
            startTime += (nudgeMs / 1000);
        }
        
        if (trackObj && trackObj.choke) {
            if (trackObj.lastSource) {
                try { trackObj.lastSource.stop(startTime); } catch (e) {}
            }
            trackObj.lastSource = source;
        }

        source.start(startTime, offsetInFile);
    }

    function updateUI() {
        const step = currentStep - 1;
        
        tracks.forEach((track, tIdx) => {
            const laneStep = step % (track.bars * 16);
            for(let b=0; b<4; b++) { 
                const ph = document.getElementById(`ph-${tIdx}-bar-${b}`); 
                if(ph) ph.style.display = 'none'; 
            }
            
            const mainPh = document.getElementById(`ph-${tIdx}-bar-${Math.floor(laneStep/16)}`);
            if (mainPh && isPlaying) { 
                mainPh.style.display = 'block'; 
                mainPh.style.left = `${(laneStep%16) * 6.25}%`; 
            }
        });

        if (activeTrackIdx !== null && isPlaying) {
            const laneStep = step % (tracks[activeTrackIdx].bars * 16);
            for(let b=0; b<4; b++) {
                const mph = document.getElementById(`modal-ph-bar-${b}`);
                if (mph) mph.style.display = 'none';
            }
            const activeMph = document.getElementById(`modal-ph-bar-${Math.floor(laneStep/16)}`);
            if (activeMph) {
                activeMph.style.display = 'block';
                activeMph.style.left = `${(laneStep%16) * 6.25}%`;
            }
        }
    }

    document.getElementById('play-btn').onclick = async function() {
        await initAudioContextAndDecode();
        await initMic(); 
        isPlaying = !isPlaying;
        if (isPlaying) { 
            currentStep = 0; nextStepTime = audioCtx.currentTime + 0.1; scheduler(); 
        } else { 
            document.querySelectorAll('.playhead').forEach(ph => ph.style.display = 'none'); 
            masterMuted = false;
            if(masterGain) masterGain.gain.setValueAtTime(1, audioCtx.currentTime);
            updateRecBtnUI(); 
        }
        this.innerText = isPlaying ? "STOP" : "PLAY";
    };

    document.getElementById('rec-action-btn').onclick = () => { 
        if(!isPlaying) return; 
        isWaitingForFirstOne = true; updateRecBtnUI(); 
    };
    
    document.getElementById('modal-commit-btn').onclick = () => {
        if (!tempBuffer) return;
        userSampleCount++;
        tracks[activeTrackIdx].buffer = tempBuffer;
        tracks[activeTrackIdx].name = `USER_${userSampleCount}`;
        
        tempBuffer = null;
        renderSequencer(); closeModal();
    };

    document.getElementById('modal-clear-btn').onclick = () => {
        tempBuffer = null; tracks[activeTrackIdx].buffer = null; tracks[activeTrackIdx].name = "EMPTY";
        tracks[activeTrackIdx].steps.fill(false); 
        
        tracks[activeTrackIdx].nudge = -200; 
        document.getElementById('modal-nudge').value = -200;
        document.getElementById('modal-nudge-val').innerText = '-200ms';
        
        renderSequencer(); renderModalLane();
    };

    document.getElementById('modal-bar-cycle').onclick = () => {
        if(activeTrackIdx !== null) cycleBars(activeTrackIdx);
    };

    document.getElementById('modal-nudge').oninput = function() {
        if(activeTrackIdx !== null) {
            tracks[activeTrackIdx].nudge = parseInt(this.value);
            document.getElementById('modal-nudge-val').innerText = this.value + 'ms';
            const mainNudgeDisplay = document.getElementById(`lane-nudge-val-${activeTrackIdx}`);
            if(mainNudgeDisplay) mainNudgeDisplay.innerText = this.value + 'ms';
        }
    };

    function updateRecBtnUI() {
        const btn = document.getElementById('rec-action-btn');
        if (isWaitingForFirstOne || isWaitingFullCycle) { btn.innerText = "WAITING..."; btn.className = "rec-btn waiting"; }
        else if (isRecordingNow) { btn.innerText = "RECORDING!"; btn.className = "rec-btn recording"; }
        else { btn.innerText = "● RECORD"; btn.className = "rec-btn"; }
    }

    function tglNode(t, s, el) { tracks[t].steps[s] = !tracks[t].steps[s]; el.classList.toggle('active'); }
    
    function openModal(i) { 
        activeTrackIdx = i; 
        
        document.getElementById('modal-nudge').value = tracks[i].nudge || 0;
        document.getElementById('modal-nudge-val').innerText = (tracks[i].nudge || 0) + 'ms';
        
        renderModalLane(); populateSampleList(); document.getElementById('sample-modal').style.display = 'flex'; 
    }
    
    function closeModal() { 
        renderSequencer();
        activeTrackIdx = null; 
        document.getElementById('sample-modal').style.display = 'none'; 
    }
    
    function populateSampleList() {
        const list = document.getElementById('modal-sample-list'); list.innerHTML = '';
        sampleFiles.forEach(file => {
            const item = document.createElement('div'); item.className = 'sample-item'; item.innerText = file;
            item.onclick = () => { 
                tracks[activeTrackIdx].name = file; 
                
                tracks[activeTrackIdx].nudge = 0;
                document.getElementById('modal-nudge').value = 0;
                document.getElementById('modal-nudge-val').innerText = '0ms';
                
                if(preFetchedBuffers[file]) {
                    const bufferCopy = preFetchedBuffers[file].slice(0);
                    audioCtx.decodeAudioData(bufferCopy, (decoded) => { tracks[activeTrackIdx].buffer = decoded; });
                } else { tracks[activeTrackIdx].buffer = null; }
                renderSequencer(); renderModalLane(); 
            };
            list.appendChild(item);
        });
    }
    
    function renderModalLane() {
        if(activeTrackIdx === null) return;
        const track = tracks[activeTrackIdx];
        const container = document.getElementById('modal-bars-container');
        document.getElementById('modal-track-name').innerText = track.name.toUpperCase();
        document.getElementById('modal-bar-cycle').innerText = `${track.bars} BAR`;
        container.innerHTML = '';
        for(let b=0; b < track.bars; b++) {
            const row = document.createElement('div'); row.className = 'bar-row';
            row.innerHTML = `<div class="playhead" id="modal-ph-bar-${b}"></div>` + 
                `<div class="node-wrapper">` +
                Array.from({length: 16}).map((_, s) => `<div class="modal-node ${(b===0&&s===0)?'the-only-one':''}"></div>`).join('') +
                `</div>`;
            container.appendChild(row);
        }
    }
    
    function cycleBars(i) { 
        tracks[i].bars = [1, 2, 4][([1, 2, 4].indexOf(tracks[i].bars) + 1) % 3]; 
        renderSequencer(); 
        if(activeTrackIdx === i) renderModalLane(); 
    }

    renderSequencer();
    preFetchAll();
</script>
</body>
</html>
